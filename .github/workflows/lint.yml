name: Lint
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: GolangCI-Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version-file: 'backend/go.mod'

      - name: Run Linter
        uses: golangci/golangci-lint-action@ec5d18412c0aeab7936cb16880d708ba2a64e153 # v6.1.0
        with:
          version: latest
          working-directory: ./backend
          args: --timeout=5m